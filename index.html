<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Алғыс айту күні құтты болсын!</title>
    <style>
        /* =========================================
           НЕГІЗГІ СТИЛЬДЕР ЖӘНЕ ТИПОГРАФИКА
           ========================================= */
        :root {
            --primary-color: #d81b60;
            --text-main: #3e2723;
            --text-muted: #5d4037;
            --glass-bg: rgba(255, 255, 255, 0.65);
            --glass-border: rgba(255, 255, 255, 0.4);
            --shadow: 0 8px 32px 0 rgba(136, 96, 104, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            overflow-x: hidden;
            position: relative;
            padding: 20px;
            color: var(--text-main);
        }

        /* =========================================
           ФОНДАҒЫ АНИМАЦИЯЛАНҒАН ЖАРЫҚ ДАҚТАРЫ (BLOBS)
           ========================================= */
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            z-index: -1;
            opacity: 0.6;
            animation: float 10s infinite ease-in-out alternate;
        }

        .blob-1 {
            width: 300px;
            height: 300px;
            background: #ffb6c1; /* Нәзік қызғылт */
            top: 10%;
            left: 10%;
            animation-delay: 0s;
        }

        .blob-2 {
            width: 400px;
            height: 400px;
            background: #e6e6fa; /* Лаванда */
            bottom: 10%;
            right: 5%;
            animation-delay: -3s;
        }

        .blob-3 {
            width: 250px;
            height: 250px;
            background: #ffdab9; /* Шабдалы */
            bottom: 40%;
            left: 30%;
            animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, 50px) scale(1.1); }
        }

        /* =========================================
           GLASSMORPHISM КАРТОЧКАСЫ
           ========================================= */
        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px 30px;
            width: 100%;
            max-width: 500px;
            box-shadow: var(--shadow);
            text-align: center;
            position: relative;
            z-index: 10;
        }

        h1 {
            font-size: clamp(1.5rem, 5vw, 2rem);
            color: var(--primary-color);
            margin-bottom: 25px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* =========================================
           МӘТІН ЖӘНЕ АНИМАЦИЯЛАР (FADE-IN)
           ========================================= */
        .content p {
            font-size: clamp(1rem, 3.5vw, 1.15rem);
            line-height: 1.6;
            margin-bottom: 18px;
            color: var(--text-muted);
            opacity: 0; /* Бастапқыда көрінбейді */
            transform: translateY(20px);
        }

        /* Әр абзацтың кезең-кезеңімен ашылуы */
        .fade-in {
            animation: fadeInUp 1.2s forwards cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .delay-1 { animation-delay: 0.5s; }
        .delay-2 { animation-delay: 2s; }
        .delay-3 { animation-delay: 4s; }
        .delay-4 { animation-delay: 5.5s; }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .footer-text {
            margin-top: 30px;
            font-size: 0.95rem;
            font-style: italic;
            font-weight: 500;
            color: var(--primary-color);
        }

        /* =========================================
           БАТЫРМАЛАР СТИЛІ
           ========================================= */
        .controls {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            opacity: 0;
            animation: fadeInUp 1s forwards;
            animation-delay: 6.5s; /* Мәтіннен кейін шығады */
        }

        button {
            border: none;
            outline: none;
            border-radius: 50px;
            padding: 14px 24px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            background: rgba(255, 255, 255, 0.8);
            color: var(--text-main);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,255,255,0.5);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
            background: #fff;
        }

        button:active {
            transform: translateY(0);
        }

        .btn-play {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            color: #fff;
            box-shadow: 0 4px 15px rgba(255, 154, 158, 0.4);
            border: none;
            animation: pulse 2s infinite; /* Назар аударту үшін пульсация */
        }

        .btn-play:hover {
            background: linear-gradient(135deg, #ff8a8e 0%, #febfdf 100%);
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 154, 158, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(255, 154, 158, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 154, 158, 0); }
        }

        .actions {
            display: flex;
            gap: 10px;
        }

        /* Хабарлама (Toast) стилі */
        #toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 30px;
            padding: 12px;
            position: fixed;
            z-index: 100;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.9rem;
            opacity: 0;
            transition: opacity 0.3s, bottom 0.3s;
        }

        #toast.show {
            visibility: visible;
            opacity: 1;
            bottom: 50px;
        }
    </style>
</head>
<body>

    <!-- Анимацияланған фондық дақтар -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <!-- Негізгі карточка -->
    <div class="card">
        <h1>Алғыс айту күні құтты болсын!</h1>
        
        <div class="content">
            <p class="fade-in delay-1">Жаным, саған алғысым шексіз!</p>
            <p class="fade-in delay-2">Өмірімде сендей жаным бар екеніне Аллаға мың да бір шүкір.</p>
            <p class="fade-in delay-3">Біліп жүр: қанша ұрысып, ренжісіп қалсақ та, мен сені бәрібір сүйемін 😘</p>
            <p class="footer-text fade-in delay-4">Ізгі тілекпен Айбек 💛</p>
        </div>

        <div class="controls">
            <!-- Музыканы басқару батырмасы -->
            <button id="playBtn" class="btn-play">
                <span id="playIcon">▶</span> Әнді қосу
            </button>
            
            <div class="actions">
                <button id="copyBtn">📋 Көшіру</button>
                <button id="shareBtn">📤 Жіберу</button>
            </div>
        </div>
    </div>

    <!-- Toast хабарламасы үшін -->
    <div id="toast">Мәтін көшірілді!</div>

    <!-- Жергілікті аудио файл (music.mp3 дегенді өз файлыңыздың атына ауыстырыңыз) -->
    <audio id="bgMusic" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <script>
        // =========================================
        // ИНТЕРФЕЙС ЖӘНЕ ЛОГИКА
        // =========================================
        
        // Музыканы қосу / тоқтату логикасы
        const playBtn = document.getElementById('playBtn');
        const bgMusic = document.getElementById('bgMusic');
        let isPlaying = false;

        // Дыбыс деңгейін орнату (50%)
        bgMusic.volume = 0.5;

        playBtn.addEventListener('click', () => {
            if (isPlaying) {
                // Тоқтату
                bgMusic.pause();
                playBtn.innerHTML = '▶ Әнді қосу';
                playBtn.style.animation = 'pulse 2s infinite';
                isPlaying = false;
            } else {
                // Ойнату
                bgMusic.play().then(() => {
                    playBtn.innerHTML = '⏸ Әнді тоқтату';
                    playBtn.style.animation = 'none';
                    isPlaying = true;
                }).catch(error => {
                    showToast("Музыка ойнатылмады! 'music.mp3' файлын тексеріңіз.");
                    console.error("Ойнату қатесі:", error);
                });
            }
        });

        // Мәтінді көшіру (Clipboard API)
        const textToCopy = "Жаным, саған алғысым шексіз!\nӨмірімде сендей жаным бар екеніне Аллаға мың да бір шүкір.\nБіліп жүр: қанша ұрысып, ренжісіп қалсақ та, мен сені бәрібір сүйемін 😘";
        
        document.getElementById('copyBtn').addEventListener('click', () => {
            // Көшірудің әмбебап тәсілі (тексттік аймақ арқылы)
            const el = document.createElement('textarea');
            el.value = textToCopy;
            el.setAttribute('readonly', '');
            el.style.position = 'absolute';
            el.style.left = '-9999px';
            document.body.appendChild(el);
            el.select();
            
            try {
                document.execCommand('copy');
                showToast("Мәтін көшірілді! 💛");
            } catch (err) {
                showToast("Көшіру мүмкін болмады.");
            }
            
            document.body.removeChild(el);
        });

        // Бөлісу (Web Share API)
        document.getElementById('shareBtn').addEventListener('click', async () => {
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: 'Алғыс айту күні',
                        text: textToCopy,
                        url: window.location.href
                    });
                } catch (err) {
                    console.log('Бөлісу тоқтатылды немесе қате шықты:', err);
                }
            } else {
                // Share API қолдау көрсетілмесе
                showToast("Сілтемені көшіріп жіберіңіз: " + window.location.href);
            }
        });

        // Хабарлама (Toast) көрсету функциясы
        function showToast(message) {
            const toast = document.getElementById("toast");
            toast.innerText = message;
            toast.className = "show";
            setTimeout(() => {
                toast.className = toast.className.replace("show", "");
            }, 3000);
        }
    </script>
</body>
</html>
